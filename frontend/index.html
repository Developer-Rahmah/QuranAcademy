<!doctype html>
<html lang="ar" dir="rtl">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      name="description"
      content="أكاديمية وهديناك لخدمات القرآن الكريم وعلومه — رحلة لتدبر آيات الله"
    />
    <!--
      Default canonical — points to the homepage on the production
      domain. The <Canonical /> React component (mounted inside
      BrowserRouter) takes ownership at runtime and rewrites this
      tag's `href` on every route change, so deeper pages still get
      their correct canonical. This static fallback exists so the
      initial server response and JS-less crawlers see a valid one.
    -->
    <link rel="canonical" href="https://www.wahdaynakacademy.com/" />
    <title>أكاديمية وهديناك — Wahdaynak Academy</title>
  </head>

  </body>
